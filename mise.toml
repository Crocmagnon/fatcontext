[env]
CGO_ENABLED = 1

[tools]
golangci-lint = "2.12.2"
goreleaser = "2"
prek = "latest"

[tasks.test]
run = "go test -race -v ./..."

[tasks.lint]
run = "golangci-lint run --fix"

# Test a release locally without pushing a tag.
[tasks.release-snapshot]
run = "goreleaser release --snapshot --clean"
